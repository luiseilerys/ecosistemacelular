<script>
// ============================================================
//  CONFIGURACIÓN
// ============================================================
const CFG = {
  WS: 4000, IC: 35, MC: 350, MF: 600, FSR: 0.7,
  MB: 0.018, SC: 0.0006, MC2: 0.0015, AE: 0.003, ME: 1,
  RE: 60, RC: 25, EFF: 24, EFK: 30, HSB: 1.8, DT: 0.1,
  GS: 100, LM: 50
};

const GENES = {
  speed:{l:'Velocidad',c:'#42a5f5',n:0.3,x:3.0}, size:{l:'Tamaño',c:'#ab47bc',n:0.2,x:1.0},
  senseRange:{l:'Percepción',c:'#66bb6a',n:60,x:280}, aggression:{l:'Agresividad',c:'#ef5350',n:0.0,x:1.0},
  sociability:{l:'Sociabilidad',c:'#ffa726',n:0.0,x:1.0}, metabolism:{l:'Metabolismo',c:'#ffee58',n:0.2,x:1.3},
  mutationRate:{l:'Tasa Mutación',c:'#ec407a',n:0.02,x:0.4}, symbiosis:{l:'Simbiosis',c:'#ff7043',n:0.0,x:1.0},
  defense:{l:'Defensa',c:'#78909c',n:0.0,x:1.0}, reproduction:{l:'Reproducción',c:'#26c6da',n:0.2,x:1.0},
  curiosity:{l:'Curiosidad',c:'#ba68c8',n:0.1,x:1.0}, patience:{l:'Paciencia',c:'#4db6ac',n:0.1,x:1.0}
};
const GNAME = Object.keys(GENES);

const BIOMES = {
  fertile:{c:'rgba(50,200,100,0.06)',e:1.4,m:0.9,l:'🌿Fértil'}, toxic:{c:'rgba(200,50,50,0.06)',e:0.6,m:1.3,l:'☢️Tóxico'},
  radiant:{c:'rgba(255,255,100,0.05)',e:1.1,m:1.0,l:'☀️Radiante'}, stable:{c:'rgba(100,100,200,0.04)',e:1.0,m:1.0,l:'⚖️Estable'}
};

const ROLES = {
  SCOUT:{c:'#42a5f5',l:'Explorador',i:'🔍',m:{speed:1.3,sense:1.4,size:0.8}}, WORKER:{c:'#66bb6a',l:'Obrero',i:'⚒️',m:{metab:0.8,size:1.1}},
  DEFENDER:{c:'#ef5350',l:'Defensor',i:'🛡️',m:{agg:1.4,size:1.2}}, BREEDER:{c:'#ec407a',l:'Reproductor',i:'🧬',m:{repro:1.5,speed:0.7}},
  SIGNALER:{c:'#ffa726',l:'Señalizador',i:'📡',m:{symb:1.5,sense:1.2}}
};

const UCOL = {flee:'#ef5350',eat:'#66bb6a',reproduce:'#ec407a',symbiosis:'#ffab40',hunt:'#ff1744',joinColony:'#7c4dff',forage:'#a5d6a7',wander:'#78909c',investigate:'#ba68c8',defend:'#42a5f5'};

// ============================================================
//  UTILIDADES
// ============================================================
function cl(v,n,x){return Math.max(n,Math.min(x,v))}
function lp(a,b,t){return a+(b-a)*t}
function dist(x1,y1,x2,y2){return Math.hypot(x2-x1,y2-y1)}
function rn(n,x){return n+Math.random()*(x-n)}

// ============================================================
//  CLASES
// ============================================================
class SpatialGrid {
  constructor(sz){this.s=sz;this.m=new Map()}
  clear(){this.m.clear()}
  k(cx,cy){return cx*100003+cy}
  ins(o){const cx=Math.floor(o.x/this.s),cy=Math.floor(o.y/this.s),k=this.k(cx,cy);if(!this.m.has(k))this.m.set(k,[]);this.m.get(k).push(o)}
  q(x,y,r){
    const res=[],r2=Math.ceil(r/this.s),cx=Math.floor(x/this.s),cy=Math.floor(y/this.s);
    for(let dx=-r2;dx<=r2;dx++) for(let dy=-r2;dy<=r2;dy++){
      const b=this.m.get(this.k(cx+dx,cy+dy));
      if(b) for(const o of b) res.push(o);
    }
    return res;
  }
}

class Personality {
  constructor(p=null) {
    this.caution = p ? lp(p.caution, rn(0.3,0.7), 0.3) : rn(0.2,0.8);
    this.optimism = p ? lp(p.optimism, rn(0.3,0.7), 0.3) : rn(0.3,0.7);
    this.stubbornness = p ? lp(p.stubbornness, rn(0.2,0.6), 0.3) : rn(0.1,0.5);
    this.empathy = p ? lp(p.empathy, rn(0.3,0.7), 0.3) : rn(0.2,0.6);
    this.creativity = p ? lp(p.creativity, rn(0.2,0.5), 0.3) : rn(0.1,0.4);
    this.routine = p ? lp(p.routine, rn(0.3,0.6), 0.3) : rn(0.2,0.6);
  }
}

class EpisodicMemory {
  constructor() { this.events = []; this.max = 15; }
  record(type, x, y, context={}) {
    this.events.push({ type, x, y, t: performance.now(), strength: 1.0, context });
    if (this.events.length > this.max) this.events.shift();
  }
  query(type, x, y, radius, maxAge=60000) {
    const now = performance.now();
    let best = null, bestScore = -1;
    for (const e of this.events) {
      if (type && e.type !== type) continue;
      if ((now - e.t) > maxAge) continue;
      const d = dist(x, y, e.x, e.y);
      const decay = Math.max(0, 1 - (now - e.t) / maxAge);
      const score = e.strength * decay * (1 - d / (radius || 200));
      if (score > bestScore) { bestScore = score; best = e; }
    }
    return best;
  }
  inherit(parent) {
    if(!parent) return;
    const sorted = [...parent.events].sort((a,b) => b.strength - a.strength).slice(0,3);
    for (const e of sorted) this.events.push({...e, strength: e.strength * 0.6, t: performance.now()});
  }
}

class QLight {
  constructor() {
    this.table = new Map();
    this.actions = ['flee','eat','reproduce','symbiosis','hunt','forage','wander','investigate'];
    this.alpha = 0.15; this.gamma = 0.85; this.epsilon = 0.15;
  }
  stateKey(hunger, threat, foodVis, inColony) {
    const h = hunger > 0.7 ? 'H' : hunger > 0.3 ? 'M' : 'L';
    const t = threat ? 'T' : '-'; const f = foodVis ? 'F' : '-'; const c = inColony ? 'C' : '-';
    return `${h}${t}${f}${c}`;
  }
  getQ(state, action) { return this.table.get(`${state}_${action}`) || 0; }
  setQ(state, action, value) { this.table.set(`${state}_${action}`, value); }
  update(state, action, reward, nextState) {
    const currentQ = this.getQ(state, action);
    let maxNextQ = -Infinity;
    for (const a of this.actions) { const q = this.getQ(nextState, a); if (q > maxNextQ) maxNextQ = q; }
    this.setQ(state, action, currentQ + this.alpha * (reward + this.gamma * maxNextQ - currentQ));
  }
  inherit(parent) { 
    if(!parent) return;
    for (const [key, val] of parent.table) this.table.set(key, val * 0.5); 
  }
}

class EmotionalState {
  constructor() { this.energy=0.5; this.stress=0.0; this.confidence=0.5; this.curiosity=0.3; this.frustration=0.0; this.contentment=0.3; }
  update(hunger, threats, recentSuccess, colonyBonus) {
    this.energy = cl(this.energy * 0.95 + (1 - hunger) * 0.05, 0, 1);
    const stressTarget = threats.length > 0 ? Math.min(1, threats.length * 0.3 + (threats[0]?.danger || 0.5)) : 0;
    this.stress = lp(this.stress, stressTarget, 0.05);
    this.confidence = cl(this.confidence * 0.98 + (recentSuccess ? 0.08 : -0.02), 0, 1);
    this.curiosity = lp(this.curiosity, this.contentment > 0.5 && this.stress < 0.3 ? 0.8 : 0.2, 0.03);
    this.frustration = cl(this.frustration * 0.95 + (recentSuccess === false ? 0.1 : -0.03), 0, 1);
    this.contentment = cl(this.contentment * 0.97 + (colonyBonus ? 0.03 : 0) + (1 - hunger) * 0.02 - this.stress * 0.02, 0, 1);
  }
  modifiers() {
    return {
      flee: 1 + this.stress * 1.2 - this.confidence * 0.3,
      eat: 1 + (1 - this.energy) * 0.5 + this.frustration * 0.3,
      reproduce: 1 + this.contentment * 0.5 - this.stress * 0.4,
      symbiosis: 1 + (1 - this.stress) * this.contentment * 0.4 - this.stress * 0.2,
      hunt: 1 + this.confidence * 0.6 - this.stress * 0.3,
      forage: 1 + this.curiosity * 0.5 + this.frustration * 0.3,
      wander: 1 + this.curiosity * 0.3 - this.frustration * 0.2,
      investigate: 1 + this.curiosity * 0.8 - this.stress * 0.4,
      defend: 1 + this.confidence * 0.5,
      joinColony: 1 + (1 - this.stress) * 0.3
    };
  }
}

class BeliefMap {
  constructor() { this.zones = new Map(); }
  observe(type, x, y, intensity) {
    const key = `${type}_${Math.floor(x/150)}_${Math.floor(y/150)}`;
    const z = this.zones.get(key) || {type, x, y, intensity: 0, t: 0, visits: 0};
    z.intensity = cl(z.intensity * 0.9 + intensity * 0.1, 0, 1);
    z.t = performance.now(); z.visits++;
    this.zones.set(key, z);
  }
  bestZone(type, cx, cy, radius) {
    let best = null, bestScore = -1;
    const r = Math.ceil((radius||200)/150);
    const ccx = Math.floor(cx/150), ccy = Math.floor(cy/150);
    for (const [k, z] of this.zones) {
      if (z.type !== type) continue;
      const dx = Math.floor(z.x/150)-ccx, dy = Math.floor(z.y/150)-ccy;
      if (Math.abs(dx) > r || Math.abs(dy) > r) continue;
      const age = (performance.now() - z.t) / 30000;
      const distF = 1 - dist(cx,cy,z.x,z.y)/(radius||200);
      const score = z.intensity * Math.max(0, 1-age) * Math.max(0, distF) * z.visits * 0.1;
      if (score > bestScore) { bestScore = score; best = z; }
    }
    return best;
  }
  inherit(parent) {
    if(!parent) return;
    for (const [k, z] of parent.zones) this.zones.set(k, {...z, intensity: z.intensity * 0.5, visits: Math.floor(z.visits * 0.5)});
  }
}

class NeuralCore {
  constructor(w=null) {
    if (w) { this.w = w; return; }
    this.w = {
      ih: Array.from({length:48}, ()=>rn(-0.5,0.5)),
      hh: Array.from({length:36}, ()=>rn(-0.3,0.3)),
      ho: Array.from({length:48}, ()=>rn(-0.5,0.5)),
      bias_h: Array.from({length:6}, ()=>rn(-0.2,0.2)),
      bias_o: Array.from({length:8}, ()=>rn(-0.2,0.2))
    };
    this.hidden = new Array(6).fill(0);
  }
  forward(inputs) {
    const {ih, hh, ho, bias_h, bias_o} = this.w; const newHidden = [];
    for (let i=0; i<6; i++) { let s = bias_h[i];
      for (let j=0; j<8; j++) s += ih[i*8+j] * inputs[j];
      for (let j=0; j<6; j++) s += hh[i*6+j] * this.hidden[j];
      newHidden.push(Math.tanh(s));
    }
    this.hidden = newHidden; const output = [];
    for (let i=0; i<8; i++) { let s = bias_o[i];
      for (let j=0; j<6; j++) s += ho[i*6+j] * this.hidden[j];
      output.push(cl(1.0 + s * 0.5, 0.15, 2.5));
    }
    return output;
  }
  inherit(parent) {
    if(!parent) return;
    this.w = { 
      ih: parent.w.ih.map(v=>v*0.7+rn(-0.1,0.1)), 
      hh: parent.w.hh.map(v=>v*0.7+rn(-0.1,0.1)), 
      ho: parent.w.ho.map(v=>v*0.7+rn(-0.1,0.1)),
      bias_h: parent.w.bias_h.map(v=>v*0.7+rn(-0.05,0.05)), 
      bias_o: parent.w.bias_o.map(v=>v*0.7+rn(-0.05,0.05)) 
    };
    this.hidden.fill(0);
  }
}

// ✅ BehavioralPlanner CON MÉTODO inherit()
class BehavioralPlanner {
  constructor() { this.currentPlan=null; this.planSteps=[]; this.planIndex=0; this.lastSuccessfulAction=null; this.repeatedFailures=0; }
  getCurrentAction() { return (this.currentPlan && this.planIndex < this.planSteps.length) ? this.planSteps[this.planIndex] : null; }
  advancePlan(success) {
    if (success) {
      this.lastSuccessfulAction = this.planSteps[this.planIndex]?.action;
      this.repeatedFailures = 0; this.planIndex++;
      if (this.planIndex >= this.planSteps.length) this.currentPlan = null;
    } else {
      this.repeatedFailures++;
      if(this.repeatedFailures>3) { this.repeatedFailures=0; const c=this.planSteps[this.planIndex]; if(c) c.urgency=Math.min(1,c.urgency+0.3); }
    }
  }
  // ✅ NUEVO: Método inherit para heredar tendencias de planificación
  inherit(parent) {
    if(!parent) return;
    this.lastSuccessfulAction = parent.lastSuccessfulAction;
    this.repeatedFailures = Math.floor(parent.repeatedFailures * 0.5);
  }
}

class Colony {
  constructor(id, center) {
    this.id=id; this.center=center; this.members=new Set(); this.energyPool=0; this.signals=[];
    this.roleDist={SCOUT:0,WORKER:0,DEFENDER:0,BREEDER:0,SIGNALER:0}; this.age=0; this.tactics=null; this.mood=0.5;
  }
  assignRoles() {
    for(const c of this.members){
      if(c.role)continue; let scores={}; const g=c.genes, p=c.personality;
      for(const [r,mods] of Object.entries(ROLES)){
        let s=1; if(mods.speed)s*=g.speed*mods.speed; if(mods.agg)s*=g.aggression*mods.agg*(1+p.caution*0.3);
        if(mods.size)s*=g.size*mods.size; if(mods.metab)s*=(2-g.metabolism)*mods.metab;
        if(mods.repro)s*=g.reproduction*mods.repro; if(mods.symb)s*=g.symbiosis*mods.symb*(1+p.empathy);
        if(mods.sense)s*=g.senseRange/100*mods.sense*(1+p.creativity); scores[r]=s;
      }
      const sorted=Object.keys(scores).sort((a,b)=>scores[b]-scores[a]);
      let assigned=sorted[0]; if(this.roleDist[assigned]>=this.members.size*0.45)assigned=sorted[1]||'WORKER';
      c.role=assigned; c.roleColor=ROLES[assigned].c; this.roleDist[assigned]++;
    }
  }
  emitSignal(type,x,y,strength=1.0){this.signals.push({type,x,y,strength:cl(strength,0,1),age:0});}
  developTactics(){
    const defC=this.roleDist.DEFENDER||0, scC=this.roleDist.SCOUT||0, t=this.members.size;
    this.tactics = defC>=t*0.3?'fortress':scC>=t*0.3?'spread':t>=10?'expansion':'survival';
  }
  update(dt){
    this.age+=dt; this.energyPool*=0.997;
    this.signals=this.signals.filter(s=>{s.age+=dt;s.strength*=0.96;return s.age<500&&s.strength>0.05;});
    let sx=0,sy=0,c=0; for(const m of this.members) if(!m.dead){sx+=m.x;sy+=m.y;c++;} else this.members.delete(m);
    if(c>0) this.center={x:sx/c,y:sy/c};

    const nearby=grid.q(this.x,this.y,effSense), nearbyFood=foodGrid.q(this.x,this.y,effSense);
    const threats=[]; for(const o of nearby){if(o===this||o.dead)continue; if(o.radius>this.radius*1.15&&o.genes.aggression>0.3) threats.push({cell:o,dist:dist(this.x,this.y,o.x,o.y),danger:o.genes.aggression*(o.radius/this.radius)});}

    if(nearbyFood.length>0){const afx=nearbyFood.reduce((a,f)=>a+f.x,0)/nearbyFood.length, afy=nearbyFood.reduce((a,f)=>a+f.y,0)/nearbyFood.length; this.beliefs.observe('food',afx,afy,nearbyFood.length/5);}

    this.goalTimer-=dt; if(this.goalTimer<=0){

      else if(this.energy>CFG.RE&&nearby.some(o=>!o.dead&&o!==this&&dist(this.x,this.y,o.x,o.y)<80&&Math.abs(this.radius-o.radius)<o.radius*0.3)){this.currentGoal='reproduce';this.goalTimer=rn(2,4);}

    U.forage*=(0.7+p.creativity*0.6); U.investigate*=(0.6+p.creativity*0.8); U.eat*=(1+p.optimism*0.2);
    const aOrd=['flee','eat','reproduce','symbiosis','hunt','joinColony','forage','wander'];
    for(let i=0;i<aOrd.length&&i<nMod.length;i++) U[aOrd[i]]*=nMod[i];

  drawDebug(ctx, c){
    if(!this.decision)return; const sx=(this.x-c.x)*c.z+ctx.canvas.width/2,sy=(this.y-c.y)*c.z+ctx.canvas.height/2;
    const r=this.radius*c.z, bw=Math.max(40,55*c.z),bh=Math.max(3,4*c.z),g=Math.max(1,2*c.z);
    let y=sy-r-25*c.z; ctx.font=`${Math.max(8,9*c.z)}px Courier New`;
    ctx.fillStyle=this.role?this.roleColor:'#fff';
    ctx.fillText(`${this.role||'Indie'} | ${this.currentGoal}${this.planner.currentPlan?' >'+this.planner.currentPlan:''}`,sx-bw/2,y); y+=12*c.z;
    const emo=this.emotions, ems=[{l:'⚡',v:emo.energy,c:'#69f0ae'},{l:'😰',v:emo.stress,c:'#ef5350'},{l:'💪',v:emo.confidence,c:'#42a5f5'},{l:'🔍',v:emo.curiosity,c:'#ba68c8'}];
    for(const e of ems){ctx.fillStyle='rgba(255,255,255,0.06)';ctx.fillRect(sx-bw/2,y,bw,bh);ctx.fillStyle=e.c;ctx.fillRect(sx-bw/2,y,bw*cl(e.v,0,1),bh);y+=bh+1;}
    y+=2*c.z; const sorted=Object.entries(this.decision.utilities).sort((a,b)=>b[1]-a[1]).slice(0,5);
    for(const [k,v] of sorted){if(v<0.03)continue;const uc=UCOL[k]||'#888';ctx.fillStyle=k===this.decision.action?uc:'rgba(255,255,255,0.06)';
      ctx.fillRect(sx-bw/2,y,bw*(k===this.decision.action?1:v),bh);ctx.fillStyle='#ccc';ctx.fillText(`${k}:${v.toFixed(1)}`,sx+bw/2+3,y+bh-1);y+=bh+g;}
  }
}

// ============================================================
//  BIOMAS & GAME LOOP
// ============================================================
function initBiomes(){biomes=[];const types=Object.keys(BIOMES);for(let i=0;i<12;i++)biomes.push({x:rn(200,CFG.WS-200),y:rn(200,CFG.WS-200),r:rn(300,600),type:types[i%4]});}
function drawBiomes(ctx,c){for(const b of biomes){const sx=(b.x-c.x)*c.z+ctx.canvas.width/2,sy=(b.y-c.y)*c.z+ctx.canvas.height/2,r=b.r*c.z;
  ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fillStyle=BIOMES[b.type].c;ctx.fill();
  if(c.z>0.25){ctx.font=`${9*c.z}px Courier New`;ctx.fillStyle='rgba(255,255,255,0.2)';ctx.textAlign='center';ctx.fillText(BIOMES[b.type].l,sx,sy);}}}

function addLog(m,t=''){logs.unshift({m,t});if(logs.length>CFG.LM)logs.pop();}
function init(){
  cells=[];food=[];colonies=[];selectedCell=null;logs=[];globalId=0;maxGen=0;initBiomes();
  for(let i=0;i<CFG.IC;i++){const g={};for(const n of GNAME)g[n]=rn(GENES[n].n,GENES[n].x);const c=new Cell(rn(300,CFG.WS-300),rn(300,CFG.WS-300),g,0);c.energy=rn(40,65);cells.push(c);}
  for(let cl=0;cl<8;cl++){const cx=rn(200,3800),cy=rn(200,3800);for(let i=0;i<38;i++)food.push(new Food(cx+rn(-150,150),cy+rn(-150,150)));}
  for(let i=0;i<80;i++)food.push(new Food(rn(50,3950),rn(50,3950))); addLog('🧬 Ecosistema IA Iniciado');
}
function update(){
  if(paused)return; const dt=CFG.DT*simSpeed;
  if(food.length<CFG.MF&&Math.random()<CFG.FSR*simSpeed){if(cells.length>0&&Math.random()<0.7){const r=cells[Math.floor(Math.random()*cells.length)];food.push(new Food(r.x+rn(-200,200),r.y+rn(-200,200)));}else food.push(new Food(rn(50,3950),rn(50,3950)));}
  cellGrid.clear();foodGrid.clear(); for(const c of cells) if(!c.dead) cellGrid.ins(c); for(const f of food) if(!f.eaten) foodGrid.ins(f);
  colonies=colonies.filter(col=>col.update(dt));
  for(const c of cells) if(!c.dead) c.update(dt,cellGrid,foodGrid);
  cells=cells.filter(c=>!c.dead); food=food.filter(f=>!f.eaten);
  const unassigned=cells.filter(c=>!c.colony&&c.genes.sociability>0.5&&c.age>0.5), used=new Set();
  for(const c of unassigned){if(used.has(c.id))continue;const nearby=unassigned.filter(o=>!used.has(o.id)&&dist(c.x,c.y,o.x,o.y)<80);
    if(nearby.length>=4){const col=new Colony(colonies.length,{x:c.x,y:c.y});for(const m of nearby.slice(0,8)){m.colony=col;col.members.add(m);used.add(m.id);col.emitSignal('rally',m.x,m.y);}
      col.assignRoles();col.developTactics();colonies.push(col);addLog(`🏛️ Colonia #${col.id} (${col.members.size} miembros, táctica: ${col.tactics})`,'colony');}}
  if(cells.length<8){for(let i=0;i<5;i++){const g={};for(const n of GNAME)g[n]=rn(GENES[n].n,GENES[n].x);cells.push(new Cell(rn(200,3800),rn(200,3800),g,0));}addLog('🔄 Repoblación','birth');}
  if(selectedCell&&!selectedCell.dead){cam.tx=selectedCell.x;cam.ty=selectedCell.y;}
  cam.x=lp(cam.x,cam.tx,0.08);cam.y=lp(cam.y,cam.ty,0.08);cam.z=lp(cam.z,cam.tz,0.08);
  if(selectedCell&&selectedCell.dead){selectedCell=null;document.getElementById('genome-panel').classList.add('hidden');}
}

function render(){
  const ctx=document.getElementById('gameCanvas').getContext('2d'); ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);
  const grd=ctx.createRadialGradient(ctx.canvas.width/2,ctx.canvas.height/2,0,ctx.canvas.width/2,ctx.canvas.height/2,ctx.canvas.width*0.8);
  grd.addColorStop(0,'#080b10');grd.addColorStop(1,'#030406');ctx.fillStyle=grd;ctx.fillRect(0,0,ctx.canvas.width,ctx.canvas.height);
  drawBiomes(ctx,cam);
  for(const col of colonies) for(const s of col.signals){const sx=(s.x-cam.x)*cam.z+ctx.canvas.width/2,sy=(s.y-cam.y)*cam.z+ctx.canvas.height/2,sr=120*s.str*cam.z;
    ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);ctx.fillStyle=s.type==='danger'?`rgba(239,83,80,${s.str*0.12})`:s.type==='food'?`rgba(102,187,106,${s.str*0.12})`:`rgba(255,255,100,${s.str*0.08})`;ctx.fill();}
  for(const col of colonies){const ms=Array.from(col.members);for(let i=0;i<ms.length;i++)for(let j=i+1;j<ms.length;j++){const d=dist(ms[i].x,ms[i].y,ms[j].x,ms[j].y);
    if(d<150){const ax=(ms[i].x-cam.x)*cam.z+ctx.canvas.width/2,ay=(ms[i].y-cam.y)*cam.z+ctx.canvas.height/2,bx=(ms[j].x-cam.x)*cam.z+ctx.canvas.width/2,by=(ms[j].y-cam.y)*cam.z+ctx.canvas.height/2;
      ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.strokeStyle=`rgba(66,165,245,${0.12*(1-d/150)})`;ctx.lineWidth=1;ctx.stroke();}}}
  for(const f of food) f.draw(ctx,cam); for(const c of cells) c.draw(ctx,cam);
  if(debugMode) for(const c of cells){const sx=(c.x-cam.x)*cam.z+ctx.canvas.width/2,sy=(c.y-cam.y)*cam.z+ctx.canvas.height/2;
    if(sx>-120&&sx<ctx.canvas.width+120&&sy>-120&&sy<ctx.canvas.height+120) c.drawDebug(ctx,cam);}
  document.getElementById('stat-cells').textContent=`🧬${cells.length}`; document.getElementById('stat-food').textContent=`🟢${food.length}`;
  document.getElementById('stat-colonies').textContent=`🏛️${colonies.length}`; document.getElementById('max-gen').textContent=maxGen;
  const mc=document.getElementById('minimap'),mx=mc.getContext('2d'); const s=mc.width/CFG.WS;mx.clearRect(0,0,mc.width,mc.height);
  mx.fillStyle='rgba(8,11,16,0.8)';mx.fillRect(0,0,mc.width,mc.height);
  for(const b of biomes){mx.fillStyle=BIOMES[b.type].c;mx.beginPath();mx.arc(b.x*s,b.y*s,b.r*s,0,Math.PI*2);mx.fill();}
  for(const c of cells){mx.fillStyle=c.role?c.roleColor:c.color;mx.fillRect(c.x*s-1,c.y*s-1,2,2);}
  const vx=(cam.x-mc.width/(2*cam.z))*s,vy=(cam.y-mc.height/(2*cam.z))*s;mx.strokeStyle='#69f0ae';mx.lineWidth=1;mx.strokeRect(vx,vy,mc.width/cam.z*s,mc.height/cam.z*s);
}

function showGenome(c){
  const p=document.getElementById('genome-panel');p.classList.remove('hidden');
  document.getElementById('genome-title').textContent=`🧬 #${c.id} | G${c.generation} | ⚡${c.energy.toFixed(1)}`;
  let h=`<div class="section"><h4>🧬 Genoma</h4>`; for(const n of GNAME){const g=GENES[n],v=c.genes[n],pct=((v-g.n)/(g.x-g.n))*100;
    h+=`<div class="gene-row"><span class="gene-label">${g.l}</span><div class="gene-bar-bg"><div class="gene-bar" style="width:${pct}%;background:${g.c}"></div></div><span class="gene-val">${v.toFixed(2)}</span></div>`;}
  h+=`</div><div class="section"><h4>🧠 Personalidad</h4>`; const pers=c.personality;
  h+=`<div class="info-row"><span>Precaución</span><span>${(pers.caution*100).toFixed(0)}%</span></div><div class="info-row"><span>Optimismo</span><span>${(pers.optimism*100).toFixed(0)}%</span></div>
  <div class="info-row"><span>Terquedad</span><span>${(pers.stubbornness*100).toFixed(0)}%</span></div><div class="info-row"><span>Empatía</span><span>${(pers.empathy*100).toFixed(0)}%</span></div>
  <div class="info-row"><span>Creatividad</span><span>${(pers.creativity*100).toFixed(0)}%</span></div></div>`;
  h+=`<div class="section"><h4>😊 Estado Emocional</h4>`; const emo=c.emotions;
  const ems=[{l:'⚡ Vitalidad',v:emo.energy,c:'#69f0ae'},{l:'😰 Estrés',v:emo.stress,c:'#ef5350'},{l:'💪 Confianza',v:emo.confidence,c:'#42a5f5'},{l:'🔍 Curiosidad',v:emo.curiosity,c:'#ba68c8'},{l:'😤 Frustración',v:emo.frustration,c:'#ff7043'}];
  for(const e of ems){h+=`<div class="info-row"><span>${e.l}</span><span>${(e.v*100).toFixed(0)}%</span></div><div class="emotion-bar"><div class="emotion-fill" style="width:${e.v*100}%;background:${e.c}"></div></div>`;}
  h+=`</div><div class="section"><h4>🤖 IA</h4>`; h+=`<div class="info-row"><span>Objetivo</span><span>${c.currentGoal}</span></div>
  <div class="info-row"><span>Plan</span><span>${c.planner.currentPlan||'-'}</span></div><div class="info-row"><span>Memoria</span><span>${c.memory.events.length} recuerdos</span></div>
  <div class="info-row"><span>Creencias</span><span>${c.beliefs.zones.size} zonas</span></div><div class="info-row"><span>Q-Table</span><span>${c.qlearn.table.size} entradas</span></div>
  <div class="info-row"><span>Colonia</span><span>${c.colony?'#'+c.colony.id+' ('+c.role+')':'-'}</span></div>
  ${c.colony?`<div class="info-row"><span>Táctica</span><span>${c.colony.tactics||'-'}</span></div>`:''}</div>`;
  document.getElementById('genome-content').innerHTML=h;
}

// ============================================================
//  EVENT LISTENERS
// ============================================================
document.getElementById('speed-slider').addEventListener('input',function(){simSpeed=this.value/100;document.getElementById('speed-value').textContent=simSpeed.toFixed(1)+'x';});
document.getElementById('debug-btn').addEventListener('click',function(){debugMode=!debugMode;this.classList.toggle('active',debugMode);this.textContent=debugMode?'🧠 ON':'🧠';});
document.getElementById('btn-start').addEventListener('click',()=>{document.getElementById('instructions').style.display='none';init();});
document.getElementById('btn-pause').addEventListener('click',function(){paused=!paused;this.textContent=paused?'▶️':'⏸️';});
document.getElementById('btn-reset').addEventListener('click',()=>{init();document.getElementById('genome-panel').classList.add('hidden');});
document.getElementById('close-genome').addEventListener('click',()=>{document.getElementById('genome-panel').classList.add('hidden');selectedCell=null;});
document.getElementById('btn-log').addEventListener('click',()=>{const p=document.getElementById('log-panel');p.style.display=p.style.display==='none'?'block':'none';if(p.style.display==='block')document.getElementById('log-content').innerHTML=logs.map(l=>`<div class="log-entry ${l.t}">${l.m}</div>`).join('');});

const cvs=document.getElementById('gameCanvas'); let drag=false, dragP={x:0,y:0}, camStart={x:0,y:0}, lastDist=0;
cvs.addEventListener('mousedown', e => { drag=true; dragP={x:e.clientX,y:e.clientY}; camStart={x:cam.tx,y:cam.ty}; });
cvs.addEventListener('mousemove', e => { if(!drag)return; cam.tx=camStart.x-(e.clientX-dragP.x)/cam.z; cam.ty=camStart.y-(e.clientY-dragP.y)/cam.z; });
cvs.addEventListener('mouseup', e => { if(Math.hypot(e.clientX-dragP.x,e.clientY-dragP.y)<10) selCell(e.clientX,e.clientY); drag=false; });
cvs.addEventListener('touchstart', e => {
  if(e.touches.length===1){ drag=true; dragP={x:e.touches[0].clientX,y:e.touches[0].clientY}; camStart={x:cam.tx,y:cam.ty}; }
  if(e.touches.length===2){ drag=false; lastDist=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY); }
}, {passive:false});
cvs.addEventListener('touchmove', e => {
  e.preventDefault();
  if(e.touches.length===2){ const d=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY); cam.tz=cl(cam.tz*(d/lastDist),0.15,3); lastDist=d; }
  if(e.touches.length===1&&drag){ cam.tx=camStart.x-(e.touches[0].clientX-dragP.x)/cam.z; cam.ty=camStart.y-(e.touches[0].clientY-dragP.y)/cam.z; }
}, {passive:false});
cvs.addEventListener('touchend', e => {
  if(e.changedTouches.length===1 && e.touches.length===0) selCell(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
  drag=false;
});
function selCell(cx,cy){
  const r=cvs.getBoundingClientRect(), wx=(cx-r.left-cvs.width/2)/cam.z+cam.x, wy=(cy-r.top-cvs.height/2)/cam.z+cam.y;
  let best=null,bd=9999; for(const c of cells){if(c.dead)continue;const d=dist(wx,wy,c.x,c.y);if(d<Math.max(c.radius+10,25)&&d<bd){best=c;bd=d;}}
  if(best){selectedCell=best;showGenome(best);cam.tx=best.x;cam.ty=best.y;}else{selectedCell=null;document.getElementById('genome-panel').classList.add('hidden');}
}
document.getElementById('zoom-in').onclick=()=>cam.tz=cl(cam.tz*1.3,0.15,3);
document.getElementById('zoom-out').onclick=()=>cam.tz=cl(cam.tz/1.3,0.15,3);
document.getElementById('zoom-follow').onclick=()=>{if(selectedCell&&!selectedCell.dead){cam.tx=selectedCell.x;cam.ty=selectedCell.y;cam.tz=1.2;}};
function resize(){const d=Math.min(window.devicePixelRatio||1,2);cvs.width=window.innerWidth*d;cvs.height=window.innerHeight*d;cvs.style.width=window.innerWidth+'px';cvs.style.height=window.innerHeight+'px';
  const mc=document.getElementById('minimap');mc.width=110*d;mc.height=110*d;mc.style.width='110px';mc.style.height='110px';mc.getContext('2d').scale(d,d);}
window.addEventListener('resize',resize);resize();

let lt=0,gt=0; function loop(ts){const dt=ts-lt;lt=ts;update();render();gt+=dt;if(gt>500){gt=0;if(selectedCell&&!selectedCell.dead)showGenome(selectedCell);}requestAnimationFrame(loop);}

initBiomes();
requestAnimationFrame(loop);
</script>
</body>
